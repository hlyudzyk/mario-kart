<!DOCTYPE html>
<html>
<head>
    <title>Mario Kart Radar</title>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; }
        canvas { background: #222; border: 2px solid #555; margin-top: 10px; }
    </style>
</head>
<body>
<h2>? Radar View</h2>
<canvas id="radar" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

const ws = new WebSocket("ws://localhost:8000/ws");

// -------------------------
// GRID (now normalized)
// -------------------------
function drawGrid() {
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 1;

    for (let i = 1; i <= 5; i++) {
        const z = i / 5; // normalized depth
        const y = HEIGHT - z * HEIGHT;

        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(WIDTH, y);
        ctx.stroke();
    }
}

// -------------------------
// PLAYER (center bottom)
// -------------------------
function drawPlayer() {
    const x = WIDTH / 2;
    const y = HEIGHT - 10;

    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, 2 * Math.PI);
    ctx.fill();

    ctx.fillText("YOU", x - 15, y - 15);
}

// -------------------------
// POINTS (normalized mapping)
// -------------------------
function drawPoints(points) {
    points.forEach(({ x, y, label }) => {

        // map [0,1] → screen
        const screenX = x * WIDTH;
        const screenY = HEIGHT - y * HEIGHT;

        // clamp just in case
        if (screenY < 0 || screenY > HEIGHT) return;

        // color by distance (normalized now!)
        let color = "green";
        if (y < 0.3) color = "red";
        else if (y< 0.6) color = "orange";

        ctx.fillStyle = color;

        ctx.beginPath();
        ctx.arc(screenX, screenY, 6, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.fillText(label, screenX + 8, screenY);
    });
}

// -------------------------
// RENDER LOOP
// -------------------------
ws.onmessage = (event) => {
    const points = JSON.parse(event.data);

    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    drawGrid();
    drawPlayer();
    drawPoints(points);
};
</script>
</body>
</html>
