<!DOCTYPE html>
<html>
<head>
    <title>Detection Viewer</title>
    <style>
        body { font-family: Arial; }
        canvas {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<h2>📦 Live Detections</h2>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

// Label mapping (optional)
const labels = {
    0: "person",
    2: "car",
    5: "bus",
    7: "truck"
};

// Connect to WS
const ws = new WebSocket("ws://localhost:8000/ws");

ws.onmessage = (event) => {
    const detections = JSON.parse(event.data);

    // Clear canvas
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    detections.forEach(det => {
        // Convert normalized → pixels
        const x1 = det.xmin * WIDTH;
        const y1 = det.ymin * HEIGHT;
        const x2 = det.xmax * WIDTH;
        const y2 = det.ymax * HEIGHT;

        const w = x2 - x1;
        const h = y2 - y1;

        // Draw rectangle
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;
        ctx.strokeRect(x1, y1, w, h);

        // Label
        const label = labels[det.label] || det.label;

        ctx.fillStyle = "lime";
        ctx.font = "14px Arial";
        ctx.fillText(
            `${label} (${det.confidence.toFixed(2)})`,
            x1,
            y1 - 5
        );
    });
};
</script>

</body>
</html>
