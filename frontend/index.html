<!DOCTYPE html>
<html>
<head>
    <title>Mario Kart Radar</title>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; }
        canvas { background: #222; border: 2px solid #555; margin-top: 10px; }
    </style>
</head>
<body>
<h2>? Radar View</h2>
<canvas id="radar" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");
const WIDTH = canvas.width;
const HEIGHT = canvas.height;

const X_SCALE = 200;
const Z_SCALE = 120;

const ws = new WebSocket("ws://localhost:8000/ws");

function drawGrid() {
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 1;
    for (let i = 1; i <= 5; i++) {
        const y = HEIGHT - i * 100;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(WIDTH, y);
        ctx.stroke();
    }
}

function drawPlayer() {
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(WIDTH / 2, HEIGHT - 20, 8, 0, 2 * Math.PI);
    ctx.fill();
    ctx.fillText("YOU", WIDTH / 2 - 15, HEIGHT - 30);
}

function drawPoints(points) {
    points.forEach(({ x, z, label }) => {
        const screenX = WIDTH / 2 + x * X_SCALE;
        const screenY = HEIGHT - z * Z_SCALE;
        if (screenY < 0) return;

        ctx.fillStyle = z < 2 ? "red" : z < 4 ? "orange" : "green";
        ctx.fillText(label, screenX + 10, screenY)
        ctx.beginPath();
        ctx.arc(screenX, screenY, 6, 0, 2 * Math.PI);
        ctx.fill();
    });
}

ws.onmessage = (event) => {
    const points = JSON.parse(event.data);
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    drawGrid();
    drawPlayer();
    drawPoints(points);
};
</script>
</body>
</html>
